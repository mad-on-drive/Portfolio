<svg xmlns="http://www.w3.org/2000/svg" width="400" height="800" viewBox="0 0 400 800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#12082e"/>
      <stop offset="45%" stop-color="#0a0618"/>
      <stop offset="100%" stop-color="#050310"/>
    </linearGradient>
    <radialGradient id="glow1" cx="70%" cy="15%" r="45%">
      <stop offset="0%" stop-color="#5b3fd4" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#5b3fd4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#1d8fe8" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1d8fe8" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse">
      <path d="M32 0H0V32" fill="none" stroke="#a78bfa" stroke-opacity="0.06" stroke-width="0.5"/>
    </pattern>
  </defs>

  <rect width="400" height="800" fill="url(#bg)"/>
  <rect width="400" height="800" fill="url(#glow1)"/>
  <rect width="400" height="800" fill="url(#glow2)"/>
  <rect width="400" height="800" fill="url(#grid)"/>

  <!-- Circuit traces -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path d="M40 120 H120 V200 H200 V160 H280 V240 H360" stroke="#38bdf8" stroke-opacity="0.22" stroke-width="1.5"/>
    <path d="M60 320 H140 V400 H220 V360 H300 V440 H340" stroke="#a78bfa" stroke-opacity="0.2" stroke-width="1.2"/>
    <path d="M80 520 H160 V600 H240 V560 H320 V640" stroke="#38bdf8" stroke-opacity="0.18" stroke-width="1"/>
    <path d="M30 680 H110 V720 H190 V680 H270 V760 H370" stroke="#667eea" stroke-opacity="0.16" stroke-width="1"/>

    <path d="M200 60 V140 M200 240 V320 M200 440 V520 M200 640 V720" stroke="#a78bfa" stroke-opacity="0.12" stroke-width="0.8"/>
    <path d="M100 200 H180 M220 400 H300 M60 560 H140" stroke="#38bdf8" stroke-opacity="0.14" stroke-width="0.8"/>
  </g>

  <!-- Pads & nodes -->
  <g>
    <circle cx="120" cy="120" r="4" fill="#38bdf8" fill-opacity="0.35"/>
    <circle cx="200" cy="160" r="3.5" fill="#a78bfa" fill-opacity="0.4"/>
    <circle cx="280" cy="240" r="4" fill="#38bdf8" fill-opacity="0.3"/>
    <circle cx="140" cy="400" r="3" fill="#a78bfa" fill-opacity="0.35"/>
    <circle cx="240" cy="560" r="4" fill="#667eea" fill-opacity="0.35"/>
    <circle cx="320" cy="640" r="3.5" fill="#38bdf8" fill-opacity="0.3"/>
    <circle cx="110" cy="720" r="3" fill="#a78bfa" fill-opacity="0.35"/>
    <circle cx="270" cy="760" r="4" fill="#38bdf8" fill-opacity="0.25"/>
  </g>

  <!-- IC chip silhouette -->
  <g transform="translate(248, 88)" opacity="0.18">
    <rect x="0" y="0" width="72" height="52" rx="4" fill="none" stroke="#a78bfa" stroke-width="1.2"/>
    <line x1="-12" y1="10" x2="0" y2="10" stroke="#38bdf8" stroke-width="1"/>
    <line x1="-12" y1="22" x2="0" y2="22" stroke="#38bdf8" stroke-width="1"/>
    <line x1="-12" y1="34" x2="0" y2="34" stroke="#38bdf8" stroke-width="1"/>
    <line x1="-12" y1="46" x2="0" y2="46" stroke="#38bdf8" stroke-width="1"/>
    <line x1="72" y1="10" x2="84" y2="10" stroke="#38bdf8" stroke-width="1"/>
    <line x1="72" y1="22" x2="84" y2="22" stroke="#38bdf8" stroke-width="1"/>
    <line x1="72" y1="34" x2="84" y2="34" stroke="#38bdf8" stroke-width="1"/>
    <line x1="72" y1="46" x2="84" y2="46" stroke="#38bdf8" stroke-width="1"/>
    <rect x="18" y="14" width="36" height="24" rx="2" fill="#a78bfa" fill-opacity="0.15"/>
  </g>

  <!-- Resistor symbol -->
  <g transform="translate(52, 430)" opacity="0.15" stroke="#38bdf8" stroke-width="1" fill="none">
    <line x1="0" y1="8" x2="12" y2="8"/>
    <path d="M12 8 L18 2 L24 14 L30 2 L36 14 L42 2 L48 8"/>
    <line x1="48" y1="8" x2="60" y2="8"/>
  </g>

  <!-- Capacitor -->
  <g transform="translate(300, 500)" opacity="0.14" stroke="#a78bfa" stroke-width="1.2">
    <line x1="0" y1="10" x2="18" y2="10" stroke="#38bdf8"/>
    <line x1="18" y1="2" x2="18" y2="18"/>
    <line x1="24" y1="2" x2="24" y2="18"/>
    <line x1="24" y1="10" x2="42" y2="10" stroke="#38bdf8"/>
  </g>

  <!-- Signal wave -->
  <path d="M48 260 L68 260 L76 230 L88 290 L100 250 L112 270 L124 260 L148 260" fill="none" stroke="#38bdf8" stroke-opacity="0.2" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
